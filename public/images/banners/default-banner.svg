<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Default banner placeholder</title>
  <desc id="desc">Warm gradient placeholder used while banner images are loading.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="45%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#99f6e4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <circle cx="180" cy="130" r="90" fill="#ffffff66"/>
  <circle cx="1030" cy="470" r="120" fill="#ffffff55"/>
  <rect x="86" y="430" width="420" height="24" rx="12" fill="#ffffffaa"/>
  <rect x="86" y="468" width="280" height="18" rx="9" fill="#ffffff99"/>
</svg>
