services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mandoquita_catalog
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mandoquita_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mandoquita_catalog
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: npm start

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mandoquita_catalog
      NODE_ENV: test
    depends_on:
      db:
        condition: service_healthy
    command: ["npx", "vitest", "run", "--environment", "node", "tests/api/catalogService.test.ts", "tests/api/productsRoutes.test.ts"]
